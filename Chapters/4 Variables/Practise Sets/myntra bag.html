<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="myntra bag.css">
  <title>Myntra Bag</title>
</head>
<body>
  <button class="my-bag" onclick="
  cartQuantity +=1;
  document.querySelector('#cart-summary').
  innerText = `Your bag has ${cartQuantity} items`;
  ">Add to Bag</button>

  <button class="my-wish" onclick="
  cartQuantity -=1;
  document.querySelector('#cart-summary').
  innerText = `Your bag has ${cartQuantity} items`;
  ">💖MOVE TO WISHLIST</button> 

  <button class="my-sale" onclick="
  cartQuantity +=2;
  document.querySelector('#cart-summary').
  innerText = `Your bag has ${cartQuantity} items`;
  ">Add 1+1 sale item</button>
  <h1 id="cart-summary"></h1>

<script>
  let cartQuantity = 0;
  document.querySelector('#cart-summary').
  innerText = `Your bag has ${cartQuantity} items`;
</script>
</body>
</html>
